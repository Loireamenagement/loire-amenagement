  <style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;max-width:100%;overflow-x:hidden;background:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.app-phone{max-width:430px;margin:0 auto;height:100vh;background:#f5f0e8;box-shadow:0 0 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;position:relative}
.app-tablet{display:flex;height:100vh;width:100%;overflow:hidden;background:#f5f0e8}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:70px;background:#f5f0e8}
.scr-tablet{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:#f5f0e8}
.scr::-webkit-scrollbar,.scr-tablet::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-thumb,.scr-tablet::-webkit-scrollbar-thumb{background:#c4b49a}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;background:#fdfcf9;border-top:1px solid #e8e0d4;display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 11px;border:none;background:transparent;cursor:pointer;gap:3px}
.bni:active{opacity:.7}
.bni-ic{font-size:16px;line-height:1}
.bni-lb{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.card{background:#fdfcf9;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;border:none;text-align:left;width:100%;transition:transform .1s;display:block;min-width:0}
.card:active{transform:scale(.98)}
.chip{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.pill{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;transition:all .15s}
.back-btn{background:rgba(255,255,255,.18);border:none;cursor:pointer;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;display:inline-flex;align-items:center;gap:5px}
.dtab{flex:1;padding:11px 4px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:600;transition:all .15s;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.chk{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;font-weight:700;color:#fff}
.sidebar{width:230px;flex-shrink:0;background:linear-gradient(180deg,#001A60 0%,#0040A0 60%,#0050B8 100%);display:flex;flex-direction:column;overflow-y:auto}
.sni{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .15s;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.split{flex:1;min-width:0;height:100vh;overflow:hidden;display:flex}
.split-left{flex-shrink:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
.split-right{flex:1;overflow-y:auto;overflow-x:hidden}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fi{animation:fi .18s ease both}
@keyframes fi2{from{opacity:0}to{opacity:1}}
.fi2{animation:fi2 .18s ease both}
@media(max-width:430px){.bnav{width:100%;left:0;transform:none}}
</style>

function goTo(screen, extra={}) {
  S.prevScreen = S.screen;
  Object.assign(S, extra);
  S.screen = screen;
  render();
  const scr = document.querySelector('.scr,.scr-tablet');
  if(scr) scr.scrollTop = 0;
}


function addPrestToPanier(id) {
  const p = PRESTATIONS.find(x=>x.id===id);
  if(p) addToPanier({id:'presta_'+p.id, type:'Prestation', nom:p.nom, col:p.col});
}
function addVedetteToPanier(id) {
  const v = VEDETTES.find(x=>x.id===id);
  if(v) addToPanier({id:'vedette_'+v.id, type:'Vedette', nom:v.nom, col:v.col});
}
function addMatToPanier(catIdx, itemIdx) {
  const m = MAT_CATS[catIdx].items[itemIdx];
  if(m) addToPanier({id:'mat_'+catIdx+'_'+itemIdx, type:'Matériau', nom:m.n, col:m.c1});
}
function addToPanier(item) {
  if(!S.panier.find(x=>x.id===item.id)) {
    S.panier.push(item);
    showPanierToast(item.nom||item.n);
  }
  render();
}
function removeFromPanier(id) { S.panier = S.panier.filter(x=>x.id!==id); render(); }
function clearPanier() { S.panier = []; render(); }

function showPanierToast(name) {
  let t = document.getElementById('toast');
  if(!t) { t = document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0040A0;color:#fff;padding:10px 20px;border-radius:20px;font-family:sans-serif;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;opacity:1;transition:opacity .3s';
  t.textContent = '+ Ajouté au panier';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 2000);
}

function isTablet() { return window.innerWidth >= 768; }

// ── PAGE HEADER ────────────────────────────────────────────────────────
function pageHeader(title, sub, backScreen, backLabel, isT) {
  return `<div style="background:linear-gradient(135deg,#002880,#0040A0);padding:${isT?'32px 40px 28px':'24px 20px 16px'};position:relative;overflow:hidden">
    <div style="position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)"></div>
    ${backScreen?`<button class="back-btn" onclick="goTo('${backScreen}')" style="margin-bottom:12px">&larr; ${backLabel||'Retour'}</button>`:''}
    <h2 style="${pf(`font-size:${isT?34:26}px;color:#fff;margin-bottom:4px`)}">${esc(title)}</h2>
    ${sub?`<p style="${sf(`font-size:${isT?14:12}px;color:rgba(255,255,255,.7);font-weight:300`)}">${esc(sub)}</p>`:''}
  </div>`;
}

function vedettesHTML(isT) {
  const cats = ['Tous',...[...new Set(VEDETTES.map(v=>PRESTATIONS.find(p=>p.id===v.prestation)?.cat||''))]];
  const liste = S.vFilter==='Tous' ? VEDETTES : VEDETTES.filter(v=>PRESTATIONS.find(p=>p.id===v.prestation)?.cat===S.vFilter);
  return `<div class="${isT?'scr-tablet':'scr'} fi">
    ${pageHeader('Prestations Vedettes', `${liste.length} fiches phares · Arguments · Prix indicatifs`, null, null, isT)}
    <div style="padding:10px 14px;overflow-x:auto;display:flex;gap:7px;scrollbar-width:none;background:#fdfcf9;border-bottom:1px solid #e8e0d4">
      ${cats.map(c=>`<button class="pill" onclick="S.vFilter='${c}';render()" style="background:${S.vFilter===c?'#0040A0':'#fdfcf9'};color:${S.vFilter===c?'#fff':'#6b6b6b'};border:1px solid ${S.vFilter===c?'#0040A0':'#e8e0d4'}">${esc(c)}</button>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:${isT?'1fr 1fr':'1fr'};gap:${isT?16:10}px;padding:${isT?'20px 32px 24px':'12px 14px 14px'};width:100%;box-sizing:border-box">

// ── RÉCAP PARTAGEABLE ──────────────────────────────────────────────────
function genererLienRecap() {
  if(!S.panier.length) { alert('Ajoutez des éléments au panier avant de générer le lien.'); return; }
  const msg = document.getElementById('client-msg')?.value || '';
  const nom = document.getElementById('client-nom')?.value || '';
  const data = {
    date: new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'}),
    nom: nom,
    msg: msg,
    panier: S.panier
  };
  try {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const url = window.location.href.split('#')[0] + '#recap/' + encoded;
    if(navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => {
        showToastMsg('✓ Lien copié ! Partagez-le au client.');
      }).catch(() => { showUrlModal(url); });
    } else {
      showUrlModal(url);
    }
  } catch(e) { alert('Erreur lors de la génération du lien.'); }
}

function showUrlModal(url) {
  let m = document.getElementById('url-modal');
  if(!m) {
    m = document.createElement('div');
    m.id = 'url-modal';
    document.body.appendChild(m);
  }
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%">
    <div style="font-family:sans-serif;font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:8px">Lien du récap</div>
    <div style="font-family:sans-serif;font-size:12px;color:#6b6b6b;margin-bottom:12px">Copiez et partagez ce lien au client :</div>
    <textarea readonly onclick="this.select()" style="width:100%;height:80px;border:1px solid #e8e0d4;border-radius:8px;padding:8px;font-size:11px;font-family:monospace;background:#f5f0e8;resize:none">${url}</textarea>
    <button onclick="document.getElementById('url-modal').style.display='none'" style="margin-top:12px;width:100%;background:#0040A0;border:none;border-radius:10px;padding:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif">Fermer</button>
  </div>`;
}

function showToastMsg(msg) {
  let t = document.getElementById('toast');
  if(!t) { t = document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0040A0;color:#fff;padding:10px 20px;border-radius:20px;font-family:sans-serif;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;opacity:1;white-space:nowrap';
  t.textContent = msg;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 3000);
}

function checkRecapHash() {
  const hash = window.location.hash;
  if(!hash.startsWith('#recap/')) return false;
  try {
    const encoded = hash.slice(7);
    const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    showRecapPage(data);
    return true;
  } catch(e) { return false; }
}

function showRecapPage(data) {
  document.body.style.background = '#f5f0e8';
  const app = document.getElementById('app');

  // Group panier by type
  const prestations = data.panier.filter(x=>x.type==='Prestation');
  const vedettes = data.panier.filter(x=>x.type==='Vedette');
  const materiaux = data.panier.filter(x=>x.type==='Matériau');

  const section = (titre, items, col) => items.length ? `
    <div style="margin-bottom:24px">
      <div style="font-family:sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:${col};font-weight:700;margin-bottom:10px">${titre}</div>
      ${items.map(item=>`

  app.innerHTML = `

      <!-- Message perso -->
      ${data.msg?`<div style="margin:20px 20px 0;background:#fff;border-radius:12px;padding:16px;border-left:3px solid #0040A0">
        <div style="font-family:sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#0040A0;font-weight:700;margin-bottom:8px">Message</div>
        <p style="font-family:sans-serif;font-size:13px;color:#6b6b6b;line-height:1.6;font-weight:300">${data.msg}</p>
      </div>`:''}

      <!-- Éléments sélectionnés -->
      <div style="padding:20px">
        ${section('Prestations retenues', prestations, '#0040A0')}
        ${section('Vedettes & solutions phares', vedettes, '#9A7020')}
        ${section('Matériaux & références', materiaux, '#8b5e3c')}
        ${!data.panier.length?'<p style="font-family:sans-serif;font-size:13px;color:#6b6b6b;text-align:center;padding:20px">Aucun élément sélectionné</p>':''}
      </div>

      <!-- Contact -->
      <div style="margin:0 20px 32px;background:#fff;border-radius:12px;padding:16px">
        <div style="font-family:sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8b5e3c;font-weight:700;margin-bottom:12px">Nous contacter</div>
        ${[['📞','06 99 86 18 56','tel:+33699861856'],['✉️','contact@loire-amenagement.com','mailto:contact@loire-amenagement.com'],['🌐','loireamenagement.github.io','']].map(([ic,t,href])=>`
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
          <span style="font-size:14px">${ic}</span>
          ${href?`<a href="${href}" style="font-family:sans-serif;font-size:13px;color:#0040A0;font-weight:500;text-decoration:none">${t}</a>`:`<span style="font-family:sans-serif;font-size:13px;color:#6b6b6b">${t}</span>`}
        </div>`).join('')}
        <a href="${window.location.href.split('#')[0]}" style="display:block;margin-top:14px;text-align:center;background:#0040A0;border-radius:10px;padding:12px;color:#fff;font-family:sans-serif;font-size:13px;font-weight:700;text-decoration:none">Voir la bibliothèque commerciale</a>
      </div>

    </div>`;
}

// ── MAIN RENDER ────────────────────────────────────────────────────────
function getScreenHTML(isT) {
  switch(S.screen) {
    case 'home': return homeHTML(isT);
    case 'vedettes': return vedettesHTML(isT);
    case 'vdet': return vedetteDetailHTML(isT);
    case 'prestations': return prestationsHTML(isT);
    case 'pdet': return prestationDetailHTML(isT);
    case 'materiaux': return materiauxHTML(isT);
    case 'mdet': return matDetailHTML(isT);
    case 'galerie': return galerieHTML(isT);
    case 'cdet': return chantierDetailHTML(isT);
    case 'partager': return partagerHTML(isT);
    default: return homeHTML(isT);
  }
}

function render() {
  const isT = isTablet();
  const app = document.getElementById('app');
  if(isT) {
    app.className = 'app-tablet';
    app.innerHTML = sidebarHTML() + getScreenHTML(true);
  } else {
    app.className = 'app-phone';
    app.innerHTML = getScreenHTML(false) + bottomNavHTML();
  }
}
window.addEventListener('resize', ()=>{ render(); });
window.addEventListener('DOMContentLoaded', function() { if(!checkRecapHash()) render(); });

</script>
