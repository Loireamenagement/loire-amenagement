*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.app-phone{max-width:430px;margin:0 auto;height:100vh;background:#f5f0e8;box-shadow:0 0 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;position:relative}
.app-tablet{display:flex;height:100vh;width:100%;background:#f5f0e8;overflow:hidden}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}
.scr-tablet{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar,.scr-tablet::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-thumb,.scr-tablet::-webkit-scrollbar-thumb{background:#c4b49a}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;background:#fdfcf9;border-top:1px solid #e8e0d4;display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 11px;border:none;background:transparent;cursor:pointer;gap:3px}
.bni:active{opacity:.7}
.bni-ic{font-size:16px;line-height:1}
.bni-lb{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.card{background:#fdfcf9;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;border:none;text-align:left;width:100%;transition:transform .1s;display:block}
.card:active{transform:scale(.98)}
.chip{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.pill{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;transition:all .15s}
.back-btn{background:rgba(255,255,255,.18);border:none;cursor:pointer;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;display:inline-flex;align-items:center;gap:5px}
.dtab{flex:1;padding:11px 4px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:600;transition:all .15s;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.chk{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;font-weight:700;color:#fff}
.sidebar{width:230px;flex-shrink:0;height:100vh;background:linear-gradient(180deg,#001A60 0%,#0040A0 60%,#0050B8 100%);display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(0,0,0,.15);overflow-y:auto}
.sni{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .15s;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.split{display:flex;height:100%}
.split-left{flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
.split-right{flex:1;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .18s ease both}
@media(max-width:430px){.bnav{width:100%;left:0;transform:none}}
</style>

function goTo(screen, extra={}) {
  S.prevScreen = S.screen;
  Object.assign(S, extra);
  S.screen = screen;
  render();
  const scr = document.querySelector('.scr,.scr-tablet');
  if(scr) scr.scrollTop = 0;
}

function isTablet() { return window.innerWidth >= 768; }

// ── HELPERS ────────────────────────────────────────────────────────────
function pf(style) { return `font-family:Georgia,'Times New Roman',serif;${style}`; }
function sf(style) { return `font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;${style}`; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function logoSVG(w,h) {
  if(LOGO) return `<img src="${LOGO}" alt="Loire" style="width:100%;height:auto"/>`;
  return `<svg viewBox="0 0 72 52" width="${w}" height="${h}">
    <rect width="72" height="52" fill="#E0ECFC" rx="4"/>
    <path d="M6 40 Q18 18 36 24 Q54 18 66 40 Z" fill="#60A040" opacity=".7"/>
    <circle cx="22" cy="22" r="8" fill="#4A8A28"/>
    <circle cx="52" cy="20" r="9" fill="#4A8A28"/>
    <path d="M28 38 Q36 8 44 38" fill="#0080C0" opacity=".4"/>
    <rect x="31" y="20" width="10" height="14" rx="1" fill="#002880" opacity=".7"/>
    <rect x="34" y="26" width="4" height="8" fill="#A0C8FF"/>
  </svg>`;
}

    <div style="padding:${isT?'24px 32px 16px':'18px'};background:#fdfcf9;border-bottom:1px solid #e8e0d4">
      <h2 style="${pf(`font-size:${isT?30:24}px;color:#1a1a1a;margin-bottom:8px`)}">${esc(m.n)}</h2>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${m.use.split('·').map(u=>`<span class="chip" style="background:#f5f0e8;color:#8b5e3c;border:1px solid #e8e0d4;font-size:${isT?12:11}px">${esc(u.trim())}</span>`).join('')}
      </div>
    </div>
    <div style="padding:${isT?'24px 32px':'18px'};max-width:${isT?600:9999}px">
      <p style="${sf(`font-size:${isT?15:13}px;color:#6b6b6b;line-height:1.7;font-weight:300;margin-bottom:20px`)}">${esc(m.d)}</p>
      <div style="background:#f5f0e8;border-radius:12px;padding:16px;border:1px solid #e8e0d4;margin-bottom:16px">
        <div style="${sf('font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#8b5e3c;font-weight:700;margin-bottom:8px')}">Utilisations</div>
        <div style="${sf(`font-size:${isT?13:12}px;color:#6b6b6b;font-weight:300`)}">${esc(m.use)}</div>
      </div>
      <button style="width:${isT?'auto':'100%'};background:#0040A0;border:none;border-radius:12px;padding:${isT?'14px 28px':'13px'};color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">Demander un échantillon</button>
    </div>
  </div>`;
}

// ── GALERIE ────────────────────────────────────────────────────────────
function galerieHTML(isT) {
  const cats = [{id:'all',lb:'Tout'},...[...new Set(GALERIE.map(g=>g.cat))].map(c=>({id:c,lb:(PRESTATIONS.find(p=>p.id===c)?.nom.split(' ')[0]||c)}))];
  const liste = S.galFilter==='all' ? GALERIE : GALERIE.filter(g=>g.cat===S.galFilter);
  return `<div class="${isT?'scr-tablet':'scr'} fi">
    ${pageHeader('Réalisations','Chantiers · Photos · Fiches détaillées',null,null,isT)}
    <div style="padding:10px 14px;overflow-x:auto;display:flex;gap:7px;scrollbar-width:none;background:#fdfcf9;border-bottom:1px solid #e8e0d4">
      ${cats.map(c=>`<button class="pill" onclick="S.galFilter='${c.id}';render()" style="background:${S.galFilter===c.id?'#0040A0':'#fdfcf9'};color:${S.galFilter===c.id?'#fff':'#6b6b6b'};border:1px solid ${S.galFilter===c.id?'#0040A0':'#e8e0d4'}">${esc(c.lb)}</button>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:${isT?'repeat(3,1fr)':'1fr 1fr'};gap:${isT?16:10}px;padding:${isT?'20px 32px 24px':'12px 14px 14px'}">
      ${liste.map((g,i)=>{
        const pr = PRESTATIONS.find(p=>p.id===g.cat);
        const isClickable = g.fiche;
        return `<button class="card" ${isClickable?`onclick="goTo('cdet',{selC:GALERIE.find(x=>x.id===${g.id})})"`:''} style="cursor:${isClickable?'pointer':'default'}">
          <div style="height:${isT?160:i%3===0?110:80}px;background:linear-gradient(140deg,${g.col},${g.col2||'#888'}20);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:10px">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.1;color:${g.col2||'#888'};width:100%;height:100%">${ICONS[g.cat]||''}</div>
            <div style="display:flex;justify-content:space-between;align-items:flex-end">
              <span class="chip" style="background:rgba(255,255,255,.22);color:#fff;font-size:9px">${esc(pr?.cat||'')}</span>
              ${isClickable?'<span style="background:rgba(255,255,255,.22);color:#fff;font-size:9px;padding:3px 7px;border-radius:4px;font-weight:600;font-family:\'DM Sans\',sans-serif">Fiche &rarr;</span>':''}
            </div>
          </div>
          <div style="padding:${isT?'12px 14px 14px':'9px 11px 11px'}">
            <div style="${sf(`font-size:${isT?13:11}px;font-weight:700;color:#1a1a1a;margin-bottom:2px`)}">${esc(g.titre)}</div>
            <div style="${sf(`font-size:${isT?11:9}px;color:#6b6b6b;font-weight:300`)}">${esc(g.detail)} · ${esc(g.lieu)}</div>
          </div>
        </button>`;
      }).join('')}
    </div>
    <div style="margin:0 ${isT?32:14}px ${isT?24:14}px;background:#fdfcf9;border-radius:12px;padding:14px;border:1px solid #e8e0d4;text-align:center">
      <p style="${sf('font-size:12px;color:#6b6b6b;font-weight:300')}">📸 Remplacez les placeholders par vos photos de chantier</p>
    </div>
  </div>`;
}

function chantierDetailHTML(isT) {
  const g = S.selC;
  if(!g) return '<div></div>';
  const pr = PRESTATIONS.find(p=>p.id===g.cat);
  return `<div class="${isT?'scr-tablet':'scr'} fi">
    <div style="background:${g.col2||'#0040A0'};padding:${isT?'32px 40px 28px':'20px 20px 28px'};position:relative;overflow:hidden;min-height:${isT?180:160}px">
      <button class="back-btn" onclick="goTo('galerie')">&larr; Réalisations</button>
      <div style="margin-top:14px">
        ${pr?`<span class="chip" style="background:rgba(255,255,255,.2);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:inline-block">${esc(pr.cat)}</span>`:''}
        <h2 style="${pf(`font-size:${isT?28:22}px;color:#fff;line-height:1.2;margin-bottom:4px`)}">${esc(g.titre)}</h2>
        <p style="${sf(`font-size:${isT?13:11}px;color:rgba(255,255,255,.7);font-weight:300`)}">${esc(g.detail)} · ${esc(g.lieu)}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:${isT?'2fr 1fr 1fr':'2fr 1fr'};gap:8px;padding:${isT?'20px 32px 8px':'14px 14px 6px'}">
      <div style="height:${isT?200:140}px;background:linear-gradient(145deg,${g.col},${g.col2||'#888'}20);border-radius:12px;display:flex;align-items:center;justify-content:center;${isT?'grid-row:span 2':''}">
        <span style="${sf('color:rgba(255,255,255,.4);font-size:12px;font-weight:300')}">Photo 1</span>
      </div>
      ${[2,3,isT?4:0].filter(Boolean).map(n=>`<div style="height:${isT?96:66}px;background:${n%2===0?g.col+'40':'#e8e0d4'};border-radius:10px;display:flex;align-items:center;justify-content:center">
        <span style="${sf('color:#6b6b6b;font-size:11px')}">${n}</span>
      </div>`).join('')}
    </div>
    <div style="padding:${isT?'16px 32px 24px':'14px 16px'}">
      ${g.desc?`<p style="${sf(`font-size:${isT?14:13}px;color:#6b6b6b;line-height:1.65;font-weight:300;margin-bottom:16px`)}">${esc(g.desc)}</p>`:''}
      ${g.mats?`<div style="display:flex;flex-wrap:wrap;gap:8px">
        ${g.mats.map(m=>`<span class="chip" style="background:#f5f0e8;color:${g.col2||'#8b5e3c'};border:1px solid #e8e0d4;font-size:${isT?12:11}px">${esc(m)}</span>`).join('')}
      </div>`:''}
    </div>
    <div style="height:8px"></div>
  </div>`;
}

// ── PARTAGER ───────────────────────────────────────────────────────────
function partagerHTML(isT) {
  const docs = [
    {id:'all-presta',cat:'Prestations',lb:'Toutes nos prestations',sub:'9 fiches complètes'},
    ...PRESTATIONS.map(p=>({id:p.id,cat:'Prestation',lb:p.nom,sub:p.cat})),
    {id:'all-vedettes',cat:'Vedettes',lb:'Toutes les vedettes',sub:'13 fiches phares'},
    ...VEDETTES.map(v=>({id:'v_'+v.id,cat:'Vedette',lb:v.nom,sub:v.prixDetail})),
    {id:'catalogue-mats',cat:'Catalogue',lb:'Catalogue matériaux',sub:'4 familles · 35 références'},
    {id:'galerie',cat:'Catalogue',lb:'Galerie réalisations',sub:'12 chantiers'},
  ];
  const cats = [...new Set(docs.map(d=>d.cat))];
  const n = S.shareSel.length;
  const allIds = JSON.stringify(docs.map(d=>d.id)).replace(/"/g,"'");

  return `<div class="${isT?'scr-tablet':'scr'} fi" style="padding-bottom:80px">
    <div style="background:linear-gradient(135deg,#002070,#0040A0);padding:${isT?'32px 40px 24px':'24px 20px 16px'}">
      <h2 style="${pf(`font-size:${isT?34:26}px;color:#fff;margin-bottom:4px`)}">Partager</h2>
      <p style="${sf(`font-size:${isT?14:12}px;color:rgba(255,255,255,.7);font-weight:300`)}">Sélectionnez les documents à envoyer au client</p>
    </div>
    <div style="display:grid;grid-template-columns:${isT?'1fr 1fr':'1fr'};gap:${isT?'0 40px':'0'};padding:${isT?'20px 32px 100px':'14px 14px 90px'}">
      ${cats.map(cat=>`<div style="margin-bottom:${isT?20:18}px">
        <div style="${sf('font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#8b5e3c;font-weight:700;margin-bottom:8px')}">${esc(cat)}</div>
        ${docs.filter(d=>d.cat===cat).map(d=>{
          const on = S.shareSel.includes(d.id);
          return `<div onclick="toggleShare('${d.id}')" style="display:flex;align-items:center;gap:13px;background:${on?'#E0ECFC':'#fdfcf9'};border-radius:10px;padding:11px 14px;margin-bottom:7px;cursor:pointer;border:1px solid ${on?'#0040A0':'#e8e0d4'};transition:all .15s">
            <div class="chk" style="background:${on?'#0040A0':'transparent'};border:1.5px solid ${on?'#0040A0':'#c4b49a'}">${on?'✓':''}</div>
            <div style="flex:1">
              <div style="${sf(`font-size:${isT?13:12}px;font-weight:600;color:#1a1a1a`)}">${esc(d.lb)}</div>
              <div style="${sf(`font-size:${isT?11:10}px;color:#6b6b6b;font-weight:300`)}">${esc(d.sub)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('')}
    </div>
    <div style="position:fixed;bottom:${isT?0:64}px;left:${isT?'230px':'0'};right:0;padding:12px 20px;background:#fdfcf9;border-top:1px solid #e8e0d4;display:flex;gap:10px;z-index:150;justify-content:${isT?'flex-end':'stretch'}">
      <button onclick="S.shareSel=${allIds};render()" style="flex:${isT?0:1};background:#f5f0e8;border:1px solid #e8e0d4;border-radius:10px;padding:12px 20px;font-size:11px;font-weight:700;color:#6b6b6b;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">Tout sélectionner</button>
      <button style="flex:${isT?0:2};background:${n?'#0040A0':'#d0ccc4'};border:none;border-radius:10px;padding:12px 28px;font-size:12px;font-weight:700;color:${n?'#fff':'#fdfcf9'};cursor:${n?'pointer':'default'};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        ${n?`Envoyer ${n} doc${n>1?'s':''} &uarr;`:'Sélectionnez des docs'}
      </button>
    </div>
  </div>`;
}

function toggleShare(id) {
  const idx = S.shareSel.indexOf(id);
  if(idx>=0) S.shareSel.splice(idx,1); else S.shareSel.push(id);
  render();
}

// ── MAIN RENDER ────────────────────────────────────────────────────────
function getScreenHTML(isT) {
  switch(S.screen) {
    case 'home': return homeHTML(isT);
    case 'vedettes': return vedettesHTML(isT);
    case 'vdet': return vedetteDetailHTML(isT);
    case 'prestations': return prestationsHTML(isT);
    case 'pdet': return prestationDetailHTML(isT);
    case 'materiaux': return materiauxHTML(isT);
    case 'mdet': return matDetailHTML(isT);
    case 'galerie': return galerieHTML(isT);
    case 'cdet': return chantierDetailHTML(isT);
    case 'partager': return partagerHTML(isT);
    default: return homeHTML(isT);
  }
}

function render() {
  const isT = isTablet();
  const app = document.getElementById('app');
  if(isT) {
    app.className = 'app-tablet';
    app.innerHTML = sidebarHTML() + `<div style="flex:1;overflow:hidden;display:flex;flex-direction:column">${getScreenHTML(true)}</div>`;
  } else {
    app.className = 'app-phone';
    app.innerHTML = getScreenHTML(false) + bottomNavHTML();
  }
}

window.addEventListener('resize', ()=>{ render(); });
window.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
